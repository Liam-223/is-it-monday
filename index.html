<!DOCTYPE html>
<html>
<head>
    <title>is it Monday?</title>
    <style>
        body {
            font-family: sans-serif;
            text-align: center;
            margin-top: 20vh;
            font-size: 4rem;
        }
    </style>
</head>
<body>

<div id="answer"></div>

<script>
const today = new Date().getDay();

if (today === 1) {
    document.getElementById("answer").textContent = "YES";
} else {
    document.getElementById("answer").textContent = "NO";
}
</script>

</body>
</html>
