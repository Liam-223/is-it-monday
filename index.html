<!DOCTYPE html>
<html>
<head>
<title>is it Monday?</title>

<style>
body{
    font-family: sans-serif;
    text-align: center;
    margin-top: 20vh;
    font-size: 4rem;
    background-color: #1e1e1e;
    color: #f5f5f5;
}
</style>

</head>
<body>

<div id="answer"></div>

<script>
document.getElementById("answer").textContent =
    new Date().getDay() === 1 ? "YES" : "NO";
</script>

</body>
</html>
