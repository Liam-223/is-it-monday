<!DOCTYPE html>
<html>
<head>
<title>is it Monday?</title>

<style>
body{
    font-family: system-ui, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-size: 4rem;
    background-color: #121212;
    color: #e8e8e8;
}
</style>

</head>
<body>

<div id="answer"></div>

<script>
document.getElementById("answer").textContent =
    new Date().getDay() === 1 ? "YES" : "NO";
</script>

</body>
</html>
